<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Корпоративный чек-лист задач — EasyForm Team</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F2EFE8; --surface: #FAFAF7; --surface2: #F5F2EB;
  --border: rgba(0,0,0,0.09); --border-md: rgba(0,0,0,0.15);
  --text: #1C1B18; --text-muted: #7A7870; --text-hint: #B0AEA6;
  --accent: #1C1B18; --accent-text: #EDE9E0;
  --radius: 14px; --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,'Inter',BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; font-size:14px; line-height:1.5; }

/* HEADER */
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:100; }
.logo-wrap { width:40px; height:40px; background:#1C1B18; border-radius:10px; overflow:hidden; flex-shrink:0; }
.logo-wrap img { width:40px; height:40px; object-fit:cover; }
.header-title h1 { font-size:15px; font-weight:600; letter-spacing:-0.3px; }
.header-title p { font-size:11px; color:var(--text-muted); letter-spacing:0.5px; text-transform:uppercase; margin-top:1px; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.who-pill { display:flex; align-items:center; gap:7px; padding:6px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; font-size:12px; color:var(--text-muted); cursor:pointer; }
.who-pill:hover { border-color:var(--border-md); }
.sync-pill { display:flex; align-items:center; gap:7px; padding:6px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; font-size:12px; color:var(--text-muted); white-space:nowrap; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:#5DCAA5; flex-shrink:0; transition:background 0.3s; }
.sync-dot.syncing { background:#EF9F27; animation:blink 0.9s infinite; }
.sync-dot.error { background:#E24B4A; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* LAYOUT: two columns */
.layout { display:flex; max-width:1440px; margin:0 auto; min-height:calc(100vh - 69px); }

/* ── PROJECTS COLUMN (left) ── */
.projects-col { width:33%; min-width:320px; max-width:460px; flex-shrink:0; border-right:1px solid var(--border); padding:20px 14px; display:flex; flex-direction:column; gap:10px; }
.projects-head { display:flex; align-items:center; justify-content:space-between; padding:0 6px 4px; flex-wrap:wrap; gap:8px; }
.projects-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-muted); }
.btn-new-project { width:24px; height:24px; border:1px solid var(--border-md); border-radius:7px; background:var(--surface); color:var(--text); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
.btn-new-project:hover { background:var(--accent); color:var(--accent-text); border-color:var(--accent); }
.projects-toolbar { display:flex; align-items:center; gap:8px; padding:0 6px; margin-bottom:2px; }
.project-sort-select { height:28px; padding:0 8px; border:1px solid var(--border-md); border-radius:20px; background:var(--surface); color:var(--text-muted); font-size:11.5px; cursor:pointer; outline:none; font-family:inherit; flex:1; }
.project-list { display:flex; flex-direction:column; gap:5px; overflow-y:auto; }
.project-item { display:flex; flex-direction:column; gap:7px; padding:11px 12px; border-radius:var(--radius-sm); cursor:pointer; transition:background 0.15s; border:1px solid var(--border); background:var(--surface); }
.project-item:hover { border-color:var(--border-md); }
.project-item.active { border-color:var(--border-md); box-shadow:var(--shadow); background:#FDFCF9; }
.project-item.done { opacity:0.55; }
.project-item.done .project-name { text-decoration:line-through; }
.project-top-row { display:flex; align-items:center; gap:9px; }
.project-check { width:19px; height:19px; border-radius:50%; border:1.5px solid var(--border-md); background:transparent; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; color:transparent; font-size:10px; }
.project-check.on { background:var(--accent); border-color:var(--accent); color:var(--accent-text); }
.project-name { font-size:13.5px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.project-fire { font-size:12px; flex-shrink:0; }
.project-meta-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding-left:28px; }
.project-count { font-size:10.5px; color:var(--text-hint); background:var(--surface2); border-radius:8px; padding:1px 7px; flex-shrink:0; }
.projects-empty { padding:30px 10px; text-align:center; color:var(--text-hint); font-size:12.5px; }

/* ── TASKS COLUMN (right) ── */
.tasks-col { flex:1; padding:20px 24px 80px; min-width:0; overflow-y:auto; }
.tasks-col-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; color:var(--text-hint); text-align:center; }
.tasks-col-empty .big-icon { font-size:44px; margin-bottom:14px; opacity:0.4; }

.project-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.project-header-title { font-size:19px; font-weight:700; letter-spacing:-0.4px; flex:1; min-width:0; border:none; background:transparent; outline:none; font-family:inherit; color:var(--text); }
.btn-del-project { width:32px; height:32px; border:1px solid var(--border); border-radius:var(--radius-sm); background:transparent; color:var(--text-hint); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
.btn-del-project:hover { background:#FAE0D8; border-color:#E0A090; color:#B03A1E; }

/* STATS */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:11px 14px; }
.stat-num { font-size:20px; font-weight:700; letter-spacing:-0.5px; }
.stat-label { font-size:10.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

/* ADD FORM */
.add-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; margin-bottom:16px; box-shadow:var(--shadow); }
.add-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-muted); margin-bottom:9px; }
.add-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }
.field input, .field select { height:36px; padding:0 10px; border:1px solid var(--border-md); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:14px; outline:none; transition:border-color 0.15s; font-family:inherit; }
.field input:focus, .field select:focus { border-color:var(--accent); }
.field-task { flex:1; min-width:160px; }
.field-task input { width:100%; }
.btn-add { height:36px; padding:0 20px; background:var(--accent); color:var(--accent-text); border:none; border-radius:var(--radius-sm); font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap; transition:opacity 0.15s,transform 0.1s; font-family:inherit; }
.btn-add:hover { opacity:0.88; }
.btn-add:active { transform:scale(0.97); }

/* TOOLBAR */
.toolbar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
.filter-btn { height:30px; padding:0 14px; border:1px solid var(--border-md); border-radius:20px; background:var(--surface); color:var(--text-muted); font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; font-family:inherit; }
.filter-btn:hover { border-color:var(--text-muted); color:var(--text); }
.filter-btn.active { background:var(--accent); color:var(--accent-text); border-color:var(--accent); }
.sort-select { height:30px; padding:0 10px; border:1px solid var(--border-md); border-radius:20px; background:var(--surface); color:var(--text-muted); font-size:12px; cursor:pointer; outline:none; font-family:inherit; margin-left:auto; }

/* TASK CARDS */
.tasks { display:flex; flex-direction:column; gap:8px; }
.task-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:13px 16px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); transition:border-color 0.15s,opacity 0.2s; cursor:pointer; animation:slideIn 0.2s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
.task-card:hover { border-color:var(--border-md); background:#FDFCF9; }
.task-card.done { opacity:0.5; }
.task-card.done .task-title { text-decoration:line-through; }
.task-card.urgent-flash { border-color:#EF9F27; }
.check-btn { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border-md); background:transparent; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; color:transparent; font-size:12px; }
.check-btn.on { background:var(--accent); border-color:var(--accent); color:var(--accent-text); }
.task-body { flex:1; min-width:0; }
.task-top { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.task-title { font-size:14px; font-weight:500; }
.fire { font-size:14px; }
.task-meta { display:flex; align-items:center; gap:6px; margin-top:4px; flex-wrap:wrap; }
.badge { display:inline-flex; align-items:center; height:19px; padding:0 7px; border-radius:10px; font-size:11px; font-weight:500; white-space:nowrap; }
.b-todo { background:#EDEBE4; color:#5A5850; }
.b-progress { background:#D8F0E8; color:#0F6E56; }
.b-review { background:#FAEDD8; color:#8C5210; }
.b-done { background:#DFF0D4; color:#3B6D11; }
.b-p1 { background:#FAE0D8; color:#B03A1E; }
.b-p2 { background:#FAF0D8; color:#8C6010; }
.b-p3 { background:#EDEBE4; color:#5A5850; }
.b-person { background:#E6EEFA; color:#1A4E9E; }
.b-comments { background:#F0EBF8; color:#6B3FA0; }
.task-date { font-size:12px; color:var(--text-muted); }
.task-date.red { color:#C0392B; font-weight:600; }
.task-date.amber { color:#9B6B0A; font-weight:500; }
.task-right { display:flex; gap:6px; align-items:center; flex-shrink:0; }
.st-select { height:28px; padding:0 8px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:12px; cursor:pointer; outline:none; font-family:inherit; }
.btn-del { width:28px; height:28px; border:1px solid var(--border); border-radius:var(--radius-sm); background:transparent; color:var(--text-hint); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.btn-del:hover { background:#FAE0D8; border-color:#E0A090; color:#B03A1E; }
.empty { text-align:center; padding:50px 20px; color:var(--text-hint); }
.empty-icon { font-size:34px; margin-bottom:10px; opacity:0.4; }

/* ── TASK DETAIL PANEL ── */
.panel-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.panel-overlay.open { opacity:1; pointer-events:all; }
.panel { position:fixed; top:0; right:0; bottom:0; width:min(480px,100vw); background:var(--surface); box-shadow:-4px 0 30px rgba(0,0,0,0.12); z-index:201; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.25s cubic-bezier(0.4,0,0.2,1); }
.panel.open { transform:translateX(0); }
.panel-head { padding:18px 20px 14px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:12px; }
.panel-head-body { flex:1; min-width:0; }
.panel-breadcrumb { font-size:11px; color:var(--text-hint); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.4px; }
.panel-title-input { width:100%; font-size:16px; font-weight:600; color:var(--text); border:none; background:transparent; outline:none; font-family:inherit; line-height:1.4; resize:none; }
.panel-meta-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.panel-field { display:flex; flex-direction:column; gap:4px; }
.panel-field label { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }
.panel-field select, .panel-field input[type=date] { height:32px; padding:0 8px; border:1px solid var(--border-md); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:13px; outline:none; font-family:inherit; }
.btn-close { width:32px; height:32px; border:1px solid var(--border); border-radius:var(--radius-sm); background:transparent; color:var(--text-muted); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; }
.btn-close:hover { background:var(--surface2); }

/* COMMENTS */
.panel-comments { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px; }
.comments-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-muted); margin-bottom:4px; }
.comment-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; }
.comment-top { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.comment-author { font-size:12px; font-weight:600; color:var(--text); }
.comment-time { font-size:11px; color:var(--text-hint); }
.comment-text { font-size:13px; color:var(--text); line-height:1.55; white-space:pre-wrap; word-break:break-word; }
.no-comments { font-size:13px; color:var(--text-hint); text-align:center; padding:24px 0; }

.panel-input-area { padding:14px 20px; border-top:1px solid var(--border); }
.comment-textarea { width:100%; min-height:72px; padding:10px 12px; border:1px solid var(--border-md); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:13px; font-family:inherit; outline:none; resize:none; line-height:1.5; transition:border-color 0.15s; }
.comment-textarea:focus { border-color:var(--accent); }
.comment-footer { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.comment-hint { font-size:11px; color:var(--text-hint); }
.btn-send { height:32px; padding:0 16px; background:var(--accent); color:var(--accent-text); border:none; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity 0.15s; }
.btn-send:hover { opacity:0.85; }

/* ── MODALS ── */
.modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:500; }
.modal { background:var(--surface); border-radius:var(--radius); padding:28px 26px; width:min(500px,94vw); box-shadow:0 8px 40px rgba(0,0,0,0.18); }
.modal h2 { font-size:17px; font-weight:700; margin-bottom:6px; letter-spacing:-0.3px; }
.modal p { font-size:13px; color:var(--text-muted); margin-bottom:18px; line-height:1.6; }
.modal-field { margin-bottom:12px; }
.modal-field label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:5px; }
.modal-field input, .modal-field select { width:100%; height:40px; padding:0 12px; border:1px solid var(--border-md); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:14px; outline:none; font-family:inherit; }
.modal-field input:focus, .modal-field select:focus { border-color:var(--accent); }
.btn-primary { width:100%; height:42px; background:var(--accent); color:var(--accent-text); border:none; border-radius:var(--radius-sm); font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:4px; transition:opacity 0.15s; }
.btn-primary:hover { opacity:0.88; }
.modal-hint { margin-top:14px; padding:12px 14px; background:var(--surface2); border-radius:var(--radius-sm); font-size:12px; color:var(--text-muted); line-height:1.7; }
.modal-hint b { color:var(--text); }
.modal-hint a { color:var(--accent); }
.modal-hint code { background:rgba(0,0,0,0.07); padding:1px 5px; border-radius:4px; font-size:11px; }

.persons-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.person-btn { height:44px; border:1.5px solid var(--border-md); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.person-btn:hover { border-color:var(--accent); background:var(--surface2); }
.person-btn.selected { border-color:var(--accent); background:var(--accent); color:var(--accent-text); }

@media(max-width:900px) {
  .layout { flex-direction:column; }
  .projects-col { width:100%; border-right:none; border-bottom:1px solid var(--border); }
  .project-list { flex-direction:row; overflow-x:auto; padding-bottom:4px; }
  .project-item { flex-shrink:0; min-width:150px; }
}
@media(max-width:640px) {
  .stats { grid-template-columns:repeat(2,1fr); }
  .add-row { flex-direction:column; }
  .btn-add { width:100%; }
  .task-right { flex-direction:column; gap:4px; }
  .header { padding:12px 14px; }
  .tasks-col { padding:16px 12px 80px; }
  .panel { width:100vw; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-wrap">
    <img src="data:image/webp;base64,UklGRvoAAABXRUJQVlA4IO4AAACwCQCdASpAAEAAPqlGmUmmJCKhN/gIAMAVCWcA0ugZZ/qJ0ALvB8MmzO2pMYLsOnSbsWKiMrD0vUaXGrwral2Cy3MEZOoZZ9N3JGCEHEZnViPd4aR38AD+9gLUSOiGMzhN64nqf91BOOtmwhI+4FlppE1l5aa2jvJnx+I0LnHOLdG8j0fUznOsPdpLBzhLpnTMWOqOiMTPahophI+sU1+ByWMgLoxqmTFHmdf06gPEGBrID2DaGLTGTe2ja7CLWXiKCz66zwE8Q+A2BcUQ4owGJqHXuRIukXThEtnYSCl4qRMqBDPIalgkx2pgEoAA" alt="EasyForm">
  </div>
  <div class="header-title">
    <h1>Корпоративный чек-лист задач</h1>
    <p>EasyForm Team</p>
  </div>
  <div class="header-right">
    <div class="who-pill" onclick="showNameModal()" title="Сменить имя">
      <span>👤</span>
      <span id="currentUserLabel">...</span>
    </div>
    <div class="sync-pill">
      <div class="sync-dot syncing" id="syncDot"></div>
      <span id="syncLabel">Подключение...</span>
    </div>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- PROJECTS COLUMN -->
  <aside class="projects-col">
    <div class="projects-head">
      <span class="projects-title">Проекты</span>
      <button class="btn-new-project" onclick="showNewProjectModal()" title="Новый проект">+</button>
    </div>
    <div class="projects-toolbar">
      <select class="project-sort-select" id="projectSortSel" onchange="renderProjects()">
        <option value="date_desc">Новые сверху</option>
        <option value="deadline">По дедлайну</option>
        <option value="priority">По приоритету</option>
        <option value="person">По имени</option>
      </select>
    </div>
    <div class="project-list" id="projectList"></div>
  </aside>

  <!-- TASKS COLUMN -->
  <main class="tasks-col" id="tasksCol">
    <!-- filled by render() -->
  </main>

</div>

<!-- TASK DETAIL PANEL -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="panel" id="taskPanel">
  <div class="panel-head">
    <div class="panel-head-body">
      <div class="panel-breadcrumb" id="panelBreadcrumb"></div>
      <textarea class="panel-title-input" id="panelTitle" rows="2" onblur="savePanelTitle()"></textarea>
      <div class="panel-meta-row" id="panelMeta"></div>
    </div>
    <button class="btn-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-comments" id="panelComments"></div>
  <div class="panel-input-area">
    <textarea class="comment-textarea" id="commentText" placeholder="Напишите комментарий... (Ctrl+Enter — отправить)"></textarea>
    <div class="comment-footer">
      <span class="comment-hint">Ctrl+Enter — отправить</span>
      <button class="btn-send" onclick="sendComment()">Отправить</button>
    </div>
  </div>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal-backdrop" id="newProjectModal" style="display:none">
  <div class="modal">
    <h2>📁 Новый проект</h2>
    <p>Заполните как обычную задачу — эти же поля можно поменять позже.</p>
    <div class="modal-field">
      <label>Название проекта</label>
      <input type="text" id="newProjectName" placeholder="Например: Запуск рекламы май" maxlength="80">
    </div>
    <div class="modal-field">
      <label>Ответственный</label>
      <select id="newProjectPerson">
        <option>Наташа</option><option>Саша</option><option>Амина</option><option>Китаец</option><option>Прочие</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Приоритет</label>
      <select id="newProjectPriority">
        <option value="p3">Низкий</option>
        <option value="p2" selected>Средний</option>
        <option value="p1">Высокий 🔥</option>
      </select>

<!-- NAME MODAL -->
<div class="modal-backdrop" id="nameModal" style="display:none">
  <div class="modal">

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, push, get, onValue, remove, update }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const DEFAULT_URL = 'https://check-list-29a98-default-rtdb.firebaseio.com';
const DEFAULT_KEY = 'AIzaSyBUH1u3MZNFWBy9oaEmiT5NGcSTabs8woU';
const FB_KEY = 'ef_firebase_config';

// ── State ──
let db = null;
let projects = {};          // { projectId: {id,name,createdAt} }
let tasks = {};             // { taskId: {id,projectId,title,person,priority,deadline,status,createdAt} }
let comments = {};          // { taskId: { commentId: {text,author,createdAt} } }
let filter = 'all';
let currentProjectId = null;
let currentTaskId = null;
let currentUser = localStorage.getItem('ef_username') || '';
let migrationDone = false;

// ── Sync UI ──
function syncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  document.getElementById('syncLabel').textContent = label;
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
}

// ── ONE-TIME MIGRATION: old flat easyform_tasks -> each becomes a project + 1 task inside, in the new isolated checklist_app namespace ──
async function runMigrationIfNeeded() {
  try {
    const flagSnap = await get(ref(db,'checklist_app/migrated_from_easyform'));
    if (flagSnap.exists() && flagSnap.val()===true) return;

    const oldTasksSnap = await get(ref(db,'easyform_tasks'));
    const oldTasks = oldTasksSnap.val() || {};
    const oldIds = Object.keys(oldTasks);

    if (oldIds.length === 0) {
      await set(ref(db,'checklist_app/migrated_from_easyform'), true);
      return;
    }

    syncStatus('syncing','Переносим задачи в проекты...');

    for (const oldId of oldIds) {
      const old = oldTasks[oldId];
      const projectId = 'proj_'+oldId;
      await set(ref(db,'checklist_app/projects/'+projectId), {
        id: projectId,
        name: old.title || 'Без названия',
        person: old.person || '',
        priority: old.priority || 'p2',
        deadline: old.deadline || '',
        status: old.status || 'todo',
        createdAt: old.createdAt || Date.now()
      });
      const newTaskId = 'task_'+oldId;
      await set(ref(db,'checklist_app/tasks/'+newTaskId), {
        id: newTaskId,
        projectId: projectId,
        title: old.title || 'Без названия',
        person: old.person || '',
        priority: old.priority || 'p2',
        deadline: old.deadline || '',
        status: old.status || 'todo',
        createdAt: old.createdAt || Date.now()
      });
      const oldCommentsSnap = await get(ref(db,'easyform_comments/'+oldId));
      if (oldCommentsSnap.exists()) {
        await set(ref(db,'checklist_app/comments/'+newTaskId), oldCommentsSnap.val());
      }
    }

    await set(ref(db,'checklist_app/migrated_from_easyform'), true);
  } catch(e) {
    console.error('Migration error', e);
  }
}

// ── Firebase ──
function initFirebase(url, apiKey) {
  try {
    const app = initializeApp({apiKey, databaseURL:url}, 'easyform');
    db = getDatabase(app);
    window._db = db;

    runMigrationIfNeeded().then(() => {
      onValue(ref(db,'checklist_app/projects'), snap => {
        projects = snap.val() || {};
        renderProjects();
        renderTasksColumn();
      });
      onValue(ref(db,'checklist_app/tasks'), snap => {
        tasks = snap.val() || {};
        renderProjects();
        renderTasksColumn();
        syncStatus('ok','Firebase · '+new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}));
      }, err => { syncStatus('error','Ошибка базы'); });
      onValue(ref(db,'checklist_app/comments'), snap => {
        comments = snap.val() || {};
        if (currentTaskId) renderComments(currentTaskId);
        renderProjects();
        renderTasksColumn();
      });
    });

    syncStatus('syncing','Подключаемся...');
  } catch(e) {
    syncStatus('error','Ошибка');
    alert('Ошибка Firebase: '+e.message);
  }
}

// ── Auto-connect (hardcoded, no manual entry needed) ──
function boot() {
  const saved = localStorage.getItem(FB_KEY);
  if (saved) {
    try { const {url,key}=JSON.parse(saved); initFirebase(url||DEFAULT_URL, key||DEFAULT_KEY); }
    catch { initFirebase(DEFAULT_URL,DEFAULT_KEY); }
  } else {
    initFirebase(DEFAULT_URL,DEFAULT_KEY);
  }

  if (!currentUser) {
    document.getElementById('nameModal').style.display = 'flex';
  } else {
    document.getElementById('currentUserLabel').textContent = currentUser;
  }
}

// ── Name modal ──
let selectedPerson = '';
window.selectPerson = function(name, btn) {
  selectedPerson = name;
  document.querySelectorAll('.person-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('nameConfirm').style.display = 'block';
};
window.confirmName = function() {
  if (!selectedPerson) return;
  currentUser = selectedPerson;
  localStorage.setItem('ef_username', currentUser);
  document.getElementById('currentUserLabel').textContent = currentUser;
  document.getElementById('nameModal').style.display = 'none';
};
window.showNameModal = function() {
  selectedPerson = '';
  document.querySelectorAll('.person-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('nameConfirm').style.display = 'none';
  document.getElementById('nameModal').style.display = 'flex';
};

// ── Projects ──
window.showNewProjectModal = function() {
  document.getElementById('newProjectName').value = '';
  document.getElementById('newProjectModal').style.display = 'flex';
  setTimeout(()=>document.getElementById('newProjectName').focus(),50);
};
window.createProject = function() {
  if (!db) { alert('Подождите подключения к базе'); return; }
  const name = document.getElementById('newProjectName').value.trim();
  if (!name) return;
  const id = 'proj_'+Date.now();
  set(ref(db,'checklist_app/projects/'+id), {
    id, name,
    person: document.getElementById('newProjectPerson').value,
    priority: document.getElementById('newProjectPriority').value,
    deadline: document.getElementById('newProjectDate').value||'',
    status: 'todo',
    createdAt: Date.now()
  });
  document.getElementById('newProjectModal').style.display = 'none';
  currentProjectId = id;
};
window.toggleProjectDone = function(id, e) {
  e && e.stopPropagation();
  const p = projects[id]; if (!p) return;
  update(ref(db,'checklist_app/projects/'+id), {status: p.status==='done'?'todo':'done'});
};
window.changeProjectStatus = function(id, val) {
  update(ref(db,'checklist_app/projects/'+id), {status: val});
};
window.updateProjectField = function(id, field, value) {
  update(ref(db,'checklist_app/projects/'+id), {[field]:value});
};
function isProjectUrgent(p) {
  if (p.status==='done') return false;
  if (p.priority==='p1') return true;
  if (!p.deadline) return false;
  return Math.ceil((new Date(p.deadline)-new Date())/86400000)<=2;
}
window.selectProject = function(id) {
  currentProjectId = id;
  renderProjects();
  renderTasksColumn();
};
window.deleteProject = function(id, e) {
  e && e.stopPropagation();
  const projTasks = Object.values(tasks).filter(t=>t.projectId===id);
  const msg = projTasks.length>0
    ? `Удалить проект и ${projTasks.length} задачу(и) внутри? Это нельзя отменить.`
    : 'Удалить проект?';
  if (!confirm(msg)) return;
  projTasks.forEach(t => {
    remove(ref(db,'checklist_app/tasks/'+t.id));
    remove(ref(db,'checklist_app/comments/'+t.id));
  });
  remove(ref(db,'checklist_app/projects/'+id));
  if (currentProjectId===id) currentProjectId = null;
};

function renderProjects() {
  const el = document.getElementById('projectList');
  let list = Object.values(projects);

  const sort = document.getElementById('projectSortSel')?.value || 'date_desc';
  if (sort==='date_desc') list.sort((a,b)=>b.createdAt-a.createdAt);
  else if (sort==='deadline') list.sort((a,b)=>{
    if (!a.deadline&&!b.deadline) return 0;
    if (!a.deadline) return 1; if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  else if (sort==='priority') { const o={p1:0,p2:1,p3:2}; list.sort((a,b)=>(o[a.priority]||2)-(o[b.priority]||2)); }
  else if (sort==='person') list.sort((a,b)=>(a.person||'').localeCompare(b.person||''));

  if (list.length===0) {
    el.innerHTML = '<div class="projects-empty">Проектов нет.<br>Создайте первый — кнопка «+»</div>';
    return;
  }

  // auto-select first project if none selected
  if (!currentProjectId && list.length>0) currentProjectId = list[0].id;

  el.innerHTML = list.map(p=>{
    const count = Object.values(tasks).filter(t=>t.projectId===p.id).length;
    const done = p.status==='done';
    const urg = isProjectUrgent(p);
    const dl = p.deadline ? deadlineInfo(p.deadline) : null;
    const [prCls,prLbl] = prBadge[p.priority] || ['b-p3','—'];
    return `<div class="project-item ${p.id===currentProjectId?'active':''} ${done?'done':''}" onclick="selectProject('${p.id}')">
      <div class="project-top-row">
        <button class="project-check ${done?'on':''}" onclick="toggleProjectDone('${p.id}',event)" title="Отметить выполненным">✓</button>
        <span class="project-name">${esc(p.name)}</span>
        ${urg&&!done?'<span class="project-fire">🔥</span>':''}
        <span class="project-count">${count}</span>
      </div>
      <div class="project-meta-row">
        <span class="badge ${stBadge[p.status]||'b-todo'}">${stLabel[p.status]||p.status}</span>
        <span class="badge ${prCls}">${prLbl}</span>
        ${p.person?`<span class="badge b-person">👤 ${esc(p.person)}</span>`:''}
        ${dl?`<span class="task-date ${dl.cls}">${dl.text}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── Tasks ──
window.addTask = function() {
  if (!db) { alert('Сначала подождите подключения к базе'); return; }
  if (!currentProjectId) { alert('Сначала выберите или создайте проект'); return; }
  const title = document.getElementById('newTitle').value.trim();
  if (!title) { document.getElementById('newTitle').focus(); return; }
  const id = 'task_'+Date.now();

    id, projectId: currentProjectId, title,
    person: document.getElementById('newPerson').value,
    priority: document.getElementById('newPriority').value,
    deadline: document.getElementById('newDate').value||'',
    status: 'todo',
    createdAt: Date.now()
  });
  document.getElementById('newTitle').value = '';
  document.getElementById('newDate').value = '';
  syncStatus('syncing','Сохраняем...');
};

window.toggleDone = function(id, e) {
  e && e.stopPropagation();
  const t = tasks[id]; if (!t) return;
  update(ref(db,'checklist_app/tasks/'+id),{status: t.status==='done'?'todo':'done'});
};
window.changeStatus = function(id, val, e) {
  e && e.stopPropagation();
  update(ref(db,'checklist_app/tasks/'+id),{status:val});
};
window.deleteTask = function(id, e) {
  e && e.stopPropagation();
  if (!confirm('Удалить задачу?')) return;
  remove(ref(db,'checklist_app/tasks/'+id));
  remove(ref(db,'checklist_app/comments/'+id));
  if (currentTaskId===id) closePanel();
};

// ── Detail Panel (shared by tasks and projects) ──
let currentEntityType = null; // 'task' | 'project'

window.openPanel = function(id) {
  const t = tasks[id]; if (!t) return;
  currentTaskId = id;
  currentEntityType = 'task';
  const proj = projects[t.projectId];
  document.getElementById('panelBreadcrumb').textContent = proj ? ('📁 '+proj.name) : '';

  document.getElementById('panelMeta').innerHTML = `
    <div class="panel-field">
      <label>Статус</label>
      <select onchange="changeStatus('${id}',this.value)">
        <option value="todo" ${t.status==='todo'?'selected':''}>К выполнению</option>
        <option value="progress" ${t.status==='progress'?'selected':''}>В работе</option>
        <option value="review" ${t.status==='review'?'selected':''}>На проверке</option>
        <option value="done" ${t.status==='done'?'selected':''}>Готово</option>
      </select>
    </div>
    <div class="panel-field">
      <label>Ответственный</label>
      <select onchange="updateTaskField('${id}','person',this.value)">
        ${['Наташа','Саша','Амина','Китаец','Прочие'].map(n=>`<option ${t.person===n?'selected':''}>${n}</option>`).join('')}
      </select>
    </div>
    <div class="panel-field">
      <label>Приоритет</label>
      <select onchange="updateTaskField('${id}','priority',this.value)">
        <option value="p1" ${t.priority==='p1'?'selected':''}>Высокий 🔥</option>
        <option value="p2" ${t.priority==='p2'?'selected':''}>Средний</option>
        <option value="p3" ${t.priority==='p3'?'selected':''}>Низкий</option>
      </select>
    </div>
    <div class="panel-field">
      <label>Дедлайн</label>
      <input type="date" value="${t.deadline||''}" onchange="updateTaskField('${id}','deadline',this.value)">
    </div>`;

  renderComments(id);
  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('taskPanel').classList.add('open');

};

window.openProjectPanel = function(id, e) {
  e && e.stopPropagation();
  const p = projects[id]; if (!p) return;

  currentEntityType = 'project';

  document.getElementById('panelMeta').innerHTML = `
    <div class="panel-field">
      <label>Статус</label>
      <select onchange="changeProjectStatus('${id}',this.value)">

        <option value="progress" ${p.status==='progress'?'selected':''}>В работе</option>
        <option value="review" ${p.status==='review'?'selected':''}>На проверке</option>
        <option value="done" ${p.status==='done'?'selected':''}>Готово</option>
      </select>
    </div>
    <div class="panel-field">
      <label>Ответственный</label>
      <select onchange="updateProjectField('${id}','person',this.value)">
        ${['Наташа','Саша','Амина','Китаец','Прочие'].map(n=>`<option ${p.person===n?'selected':''}>${n}</option>`).join('')}
      </select>
    </div>
    <div class="panel-field">
      <label>Приоритет</label>
      <select onchange="updateProjectField('${id}','priority',this.value)">
        <option value="p1" ${p.priority==='p1'?'selected':''}>Высокий 🔥</option>
        <option value="p2" ${p.priority==='p2'?'selected':''}>Средний</option>
        <option value="p3" ${p.priority==='p3'?'selected':''}>Низкий</option>
      </select>
    </div>
    <div class="panel-field">
      <label>Дедлайн</label>
      <input type="date" value="${p.deadline||''}" onchange="updateProjectField('${id}','deadline',this.value)">
    </div>`;

  renderComments(id);
  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('taskPanel').classList.add('open');
  document.getElementById('commentText').focus();
};

window.updateTaskField = function(id, field, value) {
  update(ref(db,'checklist_app/tasks/'+id), {[field]:value});
};

window.savePanelTitle = function() {
  if (!currentTaskId || !currentEntityType) return;
  const val = document.getElementById('panelTitle').value.trim();
  if (!val) return;
  if (currentEntityType==='task') update(ref(db,'checklist_app/tasks/'+currentTaskId),{title:val});
  else if (currentEntityType==='project') update(ref(db,'checklist_app/projects/'+currentTaskId),{name:val});
};

window.closePanel = function() {
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('taskPanel').classList.remove('open');
  currentTaskId = null;
  currentEntityType = null;
};

// ── Comments ──
function renderComments(taskId) {
  const el = document.getElementById('panelComments');
  const taskComments = comments[taskId] ? Object.values(comments[taskId]) : [];
  taskComments.sort((a,b)=>a.createdAt-b.createdAt);

  el.innerHTML = `<div class="comments-label">Комментарии (${taskComments.length})</div>`;
  if (taskComments.length===0) {
    el.innerHTML += `<div class="no-comments">Комментариев пока нет.<br>Напишите первым!</div>`;
    return;
  }
  el.innerHTML += taskComments.map(c=>`
    <div class="comment-item">
      <div class="comment-top">
        <span class="comment-author">👤 ${esc(c.author)}</span>
        <span class="comment-time">${formatTime(c.createdAt)}</span>
      </div>
      <div class="comment-text">${esc(c.text)}</div>
    </div>`).join('');
  el.scrollTop = el.scrollHeight;
}

window.sendComment = function() {
  if (!currentTaskId||!db) return;
  if (!currentUser) { showNameModal(); return; }
  const text = document.getElementById('commentText').value.trim();
  if (!text) return;
  push(ref(db,'checklist_app/comments/'+currentTaskId), {
    text, author:currentUser, createdAt:Date.now()
  });
  document.getElementById('commentText').value = '';
  syncStatus('syncing','Сохраняем...');
};

document.getElementById('commentText').addEventListener('keydown', e=>{
  if (e.key==='Enter'&&(e.ctrlKey||e.metaKey)) { e.preventDefault(); window.sendComment(); }
});

// ── Helpers ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatTime(ts) {
  const d = new Date(ts);
  const today = new Date();
  const isToday = d.toDateString()===today.toDateString();
  const t = d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  if (isToday) return 'сегодня '+t;
  return d.toLocaleDateString('ru',{day:'2-digit',month:'short'})+' '+t;
}
function isUrgent(t) {
  if (t.status==='done') return false;
  if (t.priority==='p1') return true;
  if (!t.deadline) return false;
  return Math.ceil((new Date(t.deadline)-new Date())/86400000)<=2;
}
function deadlineInfo(d) {
  if (!d) return null;
  const date = new Date(d+'T00:00:00');
  const days = Math.ceil((date-new Date())/86400000);
  const fmt = date.toLocaleDateString('ru',{day:'2-digit',month:'short'});
  if (days<0) return {text:fmt+' — просрочено!',cls:'red'};
  if (days===0) return {text:'Сегодня',cls:'red'};
  if (days===1) return {text:'Завтра',cls:'amber'};
  if (days<=3) return {text:fmt+` (${days} дн.)`,cls:'amber'};
  return {text:fmt,cls:''};
}

const stLabel = {todo:'К выполнению',progress:'В работе',review:'На проверке',done:'Готово'};
const stBadge = {todo:'b-todo',progress:'b-progress',review:'b-review',done:'b-done'};
const prBadge = {p1:['b-p1','Высокий'],p2:['b-p2','Средний'],p3:['b-p3','Низкий']};

window.setFilter = function(f,btn) {
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTasksColumn();
};

// ── Render right column (header + add form + toolbar + task list) ──
function renderTasksColumn() {
  const col = document.getElementById('tasksCol');
  const proj = currentProjectId ? projects[currentProjectId] : null;

  if (!proj) {
    col.innerHTML = `<div class="tasks-col-empty"><div class="big-icon">📁</div>Выберите проект слева<br>или создайте новый</div>`;
    return;
  }

  let list = Object.values(tasks).filter(t=>t.projectId===currentProjectId);
  if (filter==='urgent') list=list.filter(isUrgent);
  else if (filter!=='all') list=list.filter(t=>t.status===filter);

  const sort = document.getElementById('sortSel')?.value||'date_desc';
  if (sort==='date_desc') list.sort((a,b)=>b.createdAt-a.createdAt);
  else if (sort==='deadline') list.sort((a,b)=>{
    if (!a.deadline&&!b.deadline) return 0;
    if (!a.deadline) return 1; if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  else if (sort==='priority') { const o={p1:0,p2:1,p3:2}; list.sort((a,b)=>(o[a.priority]||2)-(o[b.priority]||2)); }
  else if (sort==='person') list.sort((a,b)=>(a.person||'').localeCompare(b.person||''));

  const all = Object.values(tasks).filter(t=>t.projectId===currentProjectId);

  col.innerHTML = `
    <div class="project-header">
      <input class="project-header-title" id="projectTitleInput" value="${esc(proj.name)}" onblur="saveProjectName('${proj.id}',this.value)">
      <button class="btn-del-project" onclick="openProjectPanel('${proj.id}',event)" title="Детали проекта и комментарии" style="font-size:14px;">💬</button>
      <button class="btn-del-project" onclick="deleteProject('${proj.id}',event)" title="Удалить проект">×</button>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="stat-num">${all.length}</div><div class="stat-label">Всего</div></div>
      <div class="stat-card"><div class="stat-num">${all.filter(t=>t.status==='done').length}</div><div class="stat-label">Готово</div></div>
      <div class="stat-card"><div class="stat-num">${all.filter(t=>t.status==='progress').length}</div><div class="stat-label">В работе</div></div>
      <div class="stat-card"><div class="stat-num">${all.filter(isUrgent).length}</div><div class="stat-label">🔥 Срочно</div></div>
    </div>

    <div class="add-card">
      <div class="add-label">Новая задача</div>
      <div class="add-row">
        <div class="field field-task">
          <label>Задача</label>
          <input type="text" id="newTitle" placeholder="Описание задачи..." maxlength="120">
        </div>
        <div class="field">
          <label>Ответственный</label>
          <select id="newPerson">
            <option>Наташа</option><option>Саша</option><option>Амина</option><option>Китаец</option><option>Прочие</option>
          </select>
        </div>
        <div class="field">
          <label>Приоритет</label>
          <select id="newPriority">
            <option value="p3">Низкий</option>
            <option value="p2" selected>Средний</option>
            <option value="p1">Высокий 🔥</option>
          </select>
        </div>
        <div class="field">
          <label>Дедлайн</label>
          <input type="date" id="newDate">
        </div>
        <button class="btn-add" onclick="addTask()">+ Добавить</button>
      </div>
    </div>

    <div class="toolbar">
      <button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter('all',this)">Все</button>
      <button class="filter-btn ${filter==='todo'?'active':''}" onclick="setFilter('todo',this)">К выполнению</button>
      <button class="filter-btn ${filter==='progress'?'active':''}" onclick="setFilter('progress',this)">В работе</button>
      <button class="filter-btn ${filter==='review'?'active':''}" onclick="setFilter('review',this)">На проверке</button>
      <button class="filter-btn ${filter==='done'?'active':''}" onclick="setFilter('done',this)">Готово</button>
      <button class="filter-btn ${filter==='urgent'?'active':''}" onclick="setFilter('urgent',this)">🔥 Срочно</button>
      <select class="sort-select" id="sortSel" onchange="renderTasksColumn()">
        <option value="date_desc">Новые сверху</option>
        <option value="deadline">По дедлайну</option>
        <option value="priority">По приоритету</option>
        <option value="person">По имени</option>
      </select>
    </div>

    <div class="tasks" id="tasksList"></div>
  `;

  document.getElementById('newTitle').addEventListener('keydown', e=>{ if(e.key==='Enter') window.addTask(); });

  const tasksListEl = document.getElementById('tasksList');
  if (list.length===0) {
    tasksListEl.innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>Задач нет. Добавьте первую!</p></div>';
    return;
  }

  tasksListEl.innerHTML = list.map(t=>{
    const done=t.status==='done', urg=isUrgent(t);
    const dl=t.deadline?deadlineInfo(t.deadline):null;
    const [prCls,prLbl]=prBadge[t.priority]||['b-p3','—'];
    const taskComments = comments[t.id] ? Object.keys(comments[t.id]).length : 0;
    return `<div class="task-card ${done?'done':''} ${urg&&!done?'urgent-flash':''}" onclick="openPanel('${t.id}')">
      <button class="check-btn ${done?'on':''}" onclick="toggleDone('${t.id}',event)" title="Отметить выполненным">✓</button>
      <div class="task-body">
        <div class="task-top">
          <span class="task-title">${esc(t.title)}</span>
          ${urg&&!done?'<span class="fire">🔥</span>':''}
        </div>
        <div class="task-meta">
          <span class="badge ${stBadge[t.status]||'b-todo'}">${stLabel[t.status]||t.status}</span>
          <span class="badge ${prCls}">${prLbl}</span>
          ${t.person?`<span class="badge b-person">👤 ${esc(t.person)}</span>`:''}
          ${dl?`<span class="task-date ${dl.cls}">${dl.text}</span>`:''}
          ${taskComments>0?`<span class="badge b-comments">💬 ${taskComments}</span>`:''}
        </div>
      </div>
      <div class="task-right">
        <select class="st-select" onclick="event.stopPropagation()" onchange="changeStatus('${t.id}',this.value,event)">
          <option value="todo" ${t.status==='todo'?'selected':''}>К выполнению</option>
          <option value="progress" ${t.status==='progress'?'selected':''}>В работе</option>
          <option value="review" ${t.status==='review'?'selected':''}>На проверке</option>
          <option value="done" ${t.status==='done'?'selected':''}>Готово</option>
        </select>
        <button class="btn-del" onclick="deleteTask('${t.id}',event)" title="Удалить">×</button>
      </div>
    </div>`;
  }).join('');
}

window.saveProjectName = function(id, val) {
  val = val.trim();
  if (val) update(ref(db,'checklist_app/projects/'+id), {name: val});
};

boot();
</script>
</body>
</html>
